services:
    api:
        build: .
        ports:
            - "8000:8000"
        depends_on:
            - postgres
            - qdrant
            - ollama

    postgres:
        image: postgres:16
        environment:
            POSTGRES_DB: medical_ai
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        ports:
            - "5432:5432"

    qdrant:
        image: qdrant/qdrant
        ports:
            - "6333:6333"
        volumes:
            - qdrant_data:/qdrant/storage

    ollama:
        image: ollama/ollama
        ports:
            - "11434:11434"
        volumes:
            - ollama_data:/root/.ollama

volumes:
    qdrant_data:
    ollama_data:
